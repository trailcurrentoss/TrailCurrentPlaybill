<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>TrailCurrent Playbill</title>
  <!-- img-src https: allows YouTube thumbnail CDNs (i.ytimg.com,
       i9.ytimg.com, yt3.ggpht.com — Google rotates the host per
       request) and any future source's thumbnail/artwork URLs without
       per-source allowlisting. img-src file: lets the Library grid load
       locally-cached poster JPGs from ~/Videos/Playbill Library/ —
       essential for off-grid use (TrailCurrent's primary goal).
       img-src/connect-src https: also covers the Explore screen pulling
       vector tiles + style JSON + sprites from the Headwaters tileserver
       (https://<headwaters-host>/{tiles,styles,fonts,data}/). worker-src
       blob: is needed by MapLibre's CSP-safe worker bootstrap.
       The rest stays restrictive. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' https: file: data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self' blob:; font-src 'self' data:; connect-src 'self' https:;">

  <link rel="stylesheet" href="styles/colors_and_type.css">
  <link rel="stylesheet" href="styles/tv.css">
  <link rel="stylesheet" href="styles/electron-overrides.css">
  <link rel="stylesheet" href="vendor/maplibre/maplibre-gl.css">

  <!-- Vendored Ionicons web component (loads icon SVGs lazily over file://) -->
  <script type="module" src="vendor/ionicons/ionicons/ionicons.esm.js"></script>
  <script nomodule src="vendor/ionicons/ionicons/ionicons.js"></script>

  <!-- Vendored React UMD -->
  <script src="vendor/react.js"></script>
  <script src="vendor/react-dom.js"></script>

  <!-- Vendored MapLibre GL JS (CSP-safe build — pairs with vendor/maplibre/
       maplibre-gl-csp-worker.js, which explore.jsx points the runtime at
       via maplibregl.setWorkerUrl). -->
  <script src="vendor/maplibre/maplibre-gl-csp.js"></script>
</head>
<body>
  <div id="tv-root"></div>

  <!-- Theme bridge: react to system light/dark changes from the GNOME desktop -->
  <script src="bootstrap-theme.js"></script>

  <!-- Pre-compiled (Babel CLI) renderer source.
       Order matters: react-globals → data → chrome (defines TopBar/SideNav/...) →
       view components → app (uses everything) → bootstrap (mounts <TVApp />). -->
  <script src="react-globals.js"></script>
  <script src="data.js"></script>
  <script src="focus-zones.js"></script>
  <script src="../build/components/chrome.js"></script>
  <script src="../build/components/home.js"></script>
  <script src="../build/components/apps.js"></script>
  <script src="../build/components/live.js"></script>
  <script src="../build/components/radio.js"></script>
  <script src="../build/components/local.js"></script>
  <script src="../build/components/rig.js"></script>
  <script src="../build/components/explore.js"></script>
  <script src="../build/components/settings.js"></script>
  <script src="../build/components/youtube.js"></script>
  <script src="../build/components/cast.js"></script>
  <script src="../build/components/music.js"></script>
  <script src="../build/components/dvd-prompt.js"></script>
  <script src="../build/components/cd-prompt.js"></script>
  <script src="../build/components/app.js"></script>
  <script src="bootstrap-app.js"></script>
</body>
</html>
