# Loaded via --input-conf. Overrides on top of mpv's built-in defaults —
# only the keys listed here change; everything else (Space, arrows, m, f, q…)
# stays at mpv defaults.
#
# The IR remote's Back button delivers KEY_ESC to whatever X window has
# focus. By default mpv binds ESC to "set fullscreen no", which drops the
# player into a windowed state while it keeps playing AND keeps focus —
# Electron never sees the keypress, so the user loses remote control of
# the rest of the UI. Rebinding ESC to quit makes Back-from-the-remote
# behave the same as Back from anywhere else in Playbill: stop playback,
# return to the GUI. BS (Backspace) gets the same treatment because the
# app's universal navigation contract (docs/app/navigation.md) treats
# Backspace and Esc identically.

ESC quit
BS  quit
