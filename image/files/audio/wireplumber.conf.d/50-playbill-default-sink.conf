# TrailCurrent Playbill — pin the default audio sink to the analog jack
#
# Audio goes out the Q6A's built-in 3.5mm headphone jack. Once the Q6 audio
# stack is loaded (q6asm_dai + q6adm + q6afe + q6core + q6routing +
# audioreach — all UN-blacklisted in image/files/modprobe/disable-unused.conf),
# ALSA exposes the card as `QCS6490RadxaDra [QCS6490-Radxa-Dragon-Q6A]`
# (verified against Radxa's official Q6A audio docs:
# https://docs.radxa.com/en/dragon/q6a/...).
#
# The headphone jack is `card 0 device 1` per Radxa's docs (`aplay -Dhw:0,1`),
# so the PipeWire node name will contain `qcs6490` and likely `MultiMedia2`
# or `HiFi`. Without this rule, WirePlumber sometimes prefers HDMI when an
# HDMI display is connected; this rule pushes the QCS6490 analog sink ahead.
#
# Match patterns are intentionally broad — exact node names vary between
# kernel versions, UCM profile versions, and PipeWire versions, so we match
# substrings rather than exact strings.

monitor.alsa.rules = [
  {
    matches = [
      # Primary match: Radxa-confirmed card name (QCS6490 SoC family)
      { node.name = "~alsa_output\\..*qcs6490.*" }
      { node.name = "~alsa_output\\..*QCS6490.*" }
      { node.name = "~alsa_output\\..*RadxaDra.*" }

      # UCM verb / hw alias the headphone jack ends up exposed under
      { node.name = "~alsa_output\\..*MultiMedia.*" }

      # Fallbacks for related Qualcomm codecs / SoCs that some kernel
      # variants use as the analog-out exposing path
      { node.name = "~alsa_output\\..*sm8250.*HEADPHONE.*" }
      { node.name = "~alsa_output\\..*wcd938x.*" }
      { node.name = "~alsa_output\\..*Headphone.*" }
    ]
    actions = {
      update-props = {
        priority.driver       = 2000
        priority.session      = 2000
        node.description      = "Headphone Jack (3.5mm)"
        device.profile.description = "TrailCurrent Playbill — analog out"
      }
    }
  }
]
