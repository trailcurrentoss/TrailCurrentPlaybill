# TrailCurrent Playbill — Q6A modprobe drop-in
#
# This is a DESKTOP image AND a media + edge-AI device. The Q6A's GPU,
# NPU (Hexagon CDSP via FastRPC), display, audio, WiFi, and Bluetooth
# subsystems are ALL first-class — nothing is blacklisted.
#
# History:
#   * Earlier revisions blacklisted the Q6 audio routing fabric
#     (q6asm_dai/q6adm/q6afe/q6core/q6routing/audioreach). That broke the
#     analog 3.5mm jack and gave us a "dummy output" sink. The audio stack
#     stays loaded — see /etc/wireplumber/wireplumber.conf.d/ for routing.
#   * Earlier revisions also blacklisted the NPU (fastrpc/qcom_fastrpc/
#     qcom_q6v5_pas/qcom_pil_info/qcom_q6v5) for "lower idle power". That
#     conflicts with using the device as an edge-AI / media co-processor
#     (Hexagon for on-device LLM, denoise, upscaling, voice, etc.) so the
#     NPU stack now loads by default. If idle power ever becomes a real
#     measured concern, gate cdsprpcd.service behind an opt-in instead of
#     reintroducing a kernel-module blacklist.
#
# Display drivers (msm/msm_dsi/msm_dp/msm_mdss) MUST stay loaded — the
# kernel console is bound to the msm framebuffer, removing them hangs the
# board mid-boot.

# ── RTL-SDR USB dongle (Realtek RTL2832U) ────────────────────────────────
# We use this device as a software-defined radio (FM/AM demod via rtl_fm
# in the Playbill Radio app). The kernel's in-tree DVB-T driver claims the
# same VID:PID on hot-plug, which prevents librtlsdr from opening it. Blacklist
# the DVB-T side so the device is left raw for userspace to claim.
#
# This does NOT affect the Hauppauge WinTV-dualHD ATSC tuner — that uses
# `dvb_usb_cxusb`, a different driver, which stays loaded for the Live TV app.
blacklist dvb_usb_rtl28xxu
blacklist rtl2832
blacklist rtl2830
