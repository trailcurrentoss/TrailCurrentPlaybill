# TrailCurrent Playbill — Q6A unused-subsystem blacklist
#
# This is a DESKTOP image, not the Headwaters appliance. We do NOT blacklist
# WiFi, Bluetooth, display, camera, OR the Q6 audio stack — those are all
# used by the GNOME desktop, the Playbill app, and the built-in 3.5mm jack.
#
# What we still block:
#   * NPU (Hexagon DSP / FastRPC) — Playbill does not run on-device LLMs;
#     leaving the NPU off keeps idle power lower and removes one moving part
#     from the kernel-update blast radius.
#
# What we INTENTIONALLY do NOT block (it was wrong before — these modules ARE
# the audio routing fabric on QCS6490; blacklisting them gave us a "dummy
# output" sink and broke the analog jack entirely):
#   * q6asm_dai, q6adm, q6afe, q6core, q6routing, audioreach
#   * msm, msm_dsi, msm_dp, msm_mdss, drm_kms_helper (display — needed for GNOME)
#   * camss, qcom_camss (camera — may be wanted for dashcam in Stage 2)
#   * ath11k* / ath / cfg80211 / mac80211 (WiFi — first-class)
#   * bluetooth, btqca, btbcm, hci_uart, btusb (BT remote support, future)
#
# Important: do NOT add display drivers (msm, msm_dsi, msm_dp, msm_mdss)
# back here even for "power savings". The Q6A's kernel console is bound to
# the msm framebuffer; removing those drivers will hard-hang the board mid-
# boot.

# ── NPU (Hexagon DSP / FastRPC) ─────────────────────────────────────────────
blacklist fastrpc
blacklist qcom_fastrpc
blacklist qcom_q6v5_pas
blacklist qcom_pil_info
blacklist qcom_q6v5
