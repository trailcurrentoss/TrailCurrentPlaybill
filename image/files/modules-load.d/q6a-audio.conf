# TrailCurrent Playbill — force-load Q6A audio fabric at boot.
#
# Why this file exists: on the running board with our prior image, dmesg
# showed `snd_soc_sc8280xp` loaded with use_count=0 — the wrong SoC's
# machine driver was probed and didn't bind. The QCS6490-specific machine
# driver (`snd_soc_qcm6490`, added to mainline in April 2024 — see LWN
# article "ASoC: qcom: add support for qcm6490 machine") wasn't autoloaded
# because the device tree compatible string didn't trigger module-alias
# autoloading. Forcing the load here is belt-and-suspenders: if the kernel
# already auto-binds, this is a no-op; if it doesn't, the modprobe attempt
# brings the right machine driver online so WCD9385 can register a real
# ALSA card instead of "Dummy Output".
#
# Modules listed cover both possible code-paths:
#   * snd_soc_qcm6490      — the QCS6490-specific machine driver (Linaro)
#   * snd_soc_sc7280       — fallback (QCS6490 shares SC7280-family lineage)
#   * snd_soc_wcd938x      — codec driver (WCD9385 is a WCD938x family chip)
#   * snd_soc_qcom_q6apm-dai - APM (Audio Processing Manager) DAI link
#   * audioreach           — audio routing fabric runtime
#
# Modules that don't exist in the running kernel fail silently; no harm.

snd_soc_qcm6490
snd_soc_sc7280
snd_soc_wcd938x
snd_soc_qcom_q6apm_dai
audioreach
