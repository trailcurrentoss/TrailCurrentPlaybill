# Playbill — system-wide mpv config tuned for Q6A (QCS6490 / Adreno 643).
# See image/rsdk/src/share/rsdk/build/rootfs.jsonnet hook 23b for rationale.
#
#   hwdec=v4l2m2m-copy  BROKEN on kernel 6.18.x (~88% drop rate)
#   hwdec=auto-safe     ALSO picks v4l2m2m for H.264 → same breakage
#   hwdec=vulkan        WORKS via Mesa Turnip on Adreno 643
#                       (H.264/HEVC/AV1 hw; VP9 → software fallback)
profile=fast
hwdec=vulkan
vo=gpu
swapchain-depth=8
sws-fast=yes
