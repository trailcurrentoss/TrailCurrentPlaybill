# Playbill — system-wide mpv config tuned for Q6A (QCS6490 / Adreno 643).
# See image/rsdk/src/share/rsdk/build/rootfs.jsonnet hook 23b for rationale.
#
# Verified 2026-05-30 on live board:
#   hwdec=v4l2m2m-copy + video-sync=display-resample
#     → 0 dropped frames on 1080p60 H.264
#     → 16% CPU (vs 39% for software decode)
#     → uses Venus VPU hardware decode, NPU + Genie unaffected
#
# Earlier doc claims were wrong:
#   "hwdec=v4l2m2m-copy is 88% broken" — that was true ONLY with the
#   default mpv sync mode. The drops were per-frame latency drops at the
#   VO side (venus' firmware RPC adds ~10-20ms per frame). With the
#   display-resample sync mode, mpv's scheduler handles the bursty input
#   correctly and drops go to zero.
#   "hwdec=vulkan WORKS via Mesa Turnip Vulkan Video" — false: Mesa Turnip
#   on Adreno A643 doesn't expose VK_KHR_video_decode_queue, so vulkan
#   silently falls back to software decode. Confirmed by ffmpeg log:
#   "Device does not support the VK_KHR_video_decode_queue extension!"
profile=fast
hwdec=v4l2m2m-copy
video-sync=display-resample
vo=gpu
swapchain-depth=8
sws-fast=yes
