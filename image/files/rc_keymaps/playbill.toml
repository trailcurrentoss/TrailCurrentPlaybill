# /etc/rc_keymaps/playbill.toml
#
# Playbill IR remote keymap. Loaded by ir-keytable at boot (via our
# /etc/udev/rules.d/60-playbill-ir-keymap.rules) and registered against
# rc-core for the gpio-ir-receiver overlay (see
# image/overlays/...-playbill-ir-recv.dts).
#
# Scancodes below were CAPTURED FROM THE PHYSICAL REMOTE on 2026-05-13
# using `sudo ir-keytable -t -p nec` on the live Q6A board. They are
# NOT the Argon ONE remote's codes from the canonical Argon decoder
# script (download.argon40.com/scripts/argonone-irdecoder-libgpiod.py).
# That script's table did not match this remote — only VOL- (0x81) by
# coincidence. The remote that ships with this rig appears to be a
# different vendor's product with a similar form factor.
#
# If/when the remote model changes, recapture with:
#
#   sudo ir-keytable -t -p nec   # press each button, copy each scancode
#
# then update the table below and reload with:
#
#   sudo ir-keytable -c -p nec -w /etc/rc_keymaps/playbill.toml
#
# Keycode → Playbill action mapping is documented in docs/app/navigation.md.

[[protocols]]
name = "playbill"
protocol = "nec"

[protocols.scancodes]
# D-pad
0xca = "KEY_UP"
0xd2 = "KEY_DOWN"
0x99 = "KEY_LEFT"
0xc1 = "KEY_RIGHT"
0xce = "KEY_ENTER"           # OK (center)

# Hierarchy + menus
0x90 = "KEY_ESC"             # Back   (Playbill: Escape == Backspace == Back)
0xcb = "KEY_HOMEPAGE"        # Home
# Menu / hamburger button. Mapped to KEY_M (the letter 'm') instead of
# the semantically-correct KEY_CONTEXT_MENU because Chromium-on-Wayland
# in the shipping Electron build silently DROPS KEY_CONTEXT_MENU events.
# Verified live on the Q6A 2026-05-15:
#   - `ir-keytable -t` shows the kernel correctly emits EV_KEY
#     KEY_CONTEXT_MENU(0x1b6) for every press of the hamburger button.
#   - Window-level capture-phase listeners on both `keydown` AND
#     `contextmenu` events in the renderer never fire — Chromium drops
#     the input between Wayland and DOM dispatch entirely.
# 'm' is consumed by Explore's canvas keydown handler (which already
# accepted 'ContextMenu' / 'm' / 'M'). Side effect: pressing the IR
# Menu button while focus is in a text input will type a literal 'm'.
# Acceptable since the IR remote isn't used for typing. Revisit when
# Electron/Chromium gains reliable KEY_CONTEXT_MENU propagation.
0x9d = "KEY_M"               # Menu — see comment above for why not KEY_CONTEXT_MENU

# Audio
0x80 = "KEY_VOLUMEUP"
0x81 = "KEY_VOLUMEDOWN"

# Launch Playbill — the remote's "Power" button does NOT power the host
# off; it launches the Playbill app. Mapped to KEY_PROG1 (XF86Launch1);
# a system-wide GNOME custom-keybinding on XF86Launch1 runs
# `gio launch /usr/share/applications/trailcurrent-playbill.desktop`.
# See the media-keys section in image/files/gnome/dconf/00-trailcurrent-playbill.
0x9c = "KEY_PROG1"
