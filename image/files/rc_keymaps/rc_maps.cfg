# /etc/rc_maps.cfg
#
# Maps every detected rc-core device whose rc-map-name matches the second
# column to the keymap file in the third column. ir-keytable reads this file
# at boot (as a systemd udev hook) and uploads the keymap to the kernel.
#
# Playbill's gpio-ir-receiver overlay (qcs6490-radxa-dragon-q6a-playbill-ir-recv.dtbo)
# exports linux,rc-map-name = "rc-playbill", which this line picks up.
#
# Driver       rc-map-name    Keymap file
*              rc-playbill    /etc/rc_keymaps/playbill.toml
