# TrailCurrent Playbill — Q6A kernel tuning
#
# Conservative desktop defaults. We're optimizing for a responsive GNOME
# session + a single fullscreen Electron app, not for a long-running compute
# workload. Kept simple so future kernel upgrades don't need to revisit this.

# Don't aggressively swap with ~8 GB available — stay in RAM.
vm.swappiness = 10

# Standard desktop dirty-page ratios.
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5

# Electron + GNOME both watch a lot of files. Default is 8192 — too low.
fs.inotify.max_user_watches = 65536

# Keep kernel printk noise off the desktop console.
kernel.printk = 4 4 1 7
