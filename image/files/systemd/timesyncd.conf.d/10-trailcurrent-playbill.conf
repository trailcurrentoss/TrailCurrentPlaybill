# /etc/systemd/timesyncd.conf.d/10-trailcurrent-playbill.conf
#
# Drop-in for systemd-timesyncd. The Q6A has no working hardware RTC battery
# holder population by default (the DS1307 chip is on the board but ships
# without a CR2032), so cold boot starts the clock at whatever firmware-
# default the kernel reads from the depleted RTC — typically several days
# to weeks in the past. The MQTT bridge then fails to validate the
# Headwaters broker's TLS certificate with "certificate is not yet valid"
# (which mqtt.js stringifies as the generic "self-signed certificate in
# certificate chain" — see feedback memory feedback_q6a_clock_skew_blocks_mqtt.md).
#
# Resolution at boot:
#   1. Kernel reads the DS1307 RTC. If a CR2032 is installed, this is
#      correct; if not, this seeds garbage.
#   2. systemd-timesyncd (enabled by hook 19) polls NTP. Primary is
#      Headwaters on the rig LAN — it doesn't currently run NTP on the
#      reference rig but is listed first so rigs that DO run NTP there
#      pick it up without further config. Fallback chain reaches public
#      pools so any rig with internet path corrects the clock within
#      ~30 seconds of network being up.
#   3. Final-resort fallback: the playbill-controller's internal
#      GNSS time-sync (controller/src/services/...) sets the clock from
#      the cellular module's GNSS receiver once a fix is acquired
#      (~30s cold, faster on warm fix).
#
# The MQTT bridge retries every 5 seconds (mqtt.js reconnectPeriod) so as
# soon as ANY of these three sources moves the clock forward of the
# Headwaters cert's notBefore date, the next reconnect attempt succeeds
# and the rig comes online.

[Time]
NTP=headwaters.local
FallbackNTP=pool.ntp.org time.cloudflare.com time.google.com
