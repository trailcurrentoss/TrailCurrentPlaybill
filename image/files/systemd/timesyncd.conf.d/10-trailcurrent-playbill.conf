# /etc/systemd/timesyncd.conf.d/10-trailcurrent-playbill.conf
#
# Headwaters runs NTP on the rig LAN (confirmed 2026-05-15). It is the
# canonical clock source for off-grid rigs. Public NTP pools sit in
# FallbackNTP= as a safety net for the case where Headwaters is
# unavailable but the rig has internet.
#
# A note about fallback semantics (kept for future agents):
# `systemd-timesyncd` only advances from `NTP=` to `FallbackNTP=` when
# the primary fails to RESOLVE. A primary that resolves but times out
# is retried forever, never falling through. So this drop-in keeps
# headwaters.local as the SINGLE primary; if Headwaters NTP service
# ever permanently stops responding, the fallback won't kick in and
# the clock won't sync. The DS1307 RTC + CR2032 battery means clock
# drift is bounded by RTC accuracy in that scenario (acceptable for
# this product). Resolution failure (DNS / unreachable) DOES move us
# to FallbackNTP — that's the "rig has internet but isn't on the
# Headwaters LAN" case.

[Time]
NTP=headwaters.local
FallbackNTP=time.cloudflare.com pool.ntp.org time.google.com
