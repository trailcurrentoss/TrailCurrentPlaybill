        \ \\\n    /usr/share/plymouth/themes/trailcurrent/trailcurrent.plymouth 200\n\
        chroot \"$1\" update-alternatives --set default.plymouth \\\n    /usr/share/plymouth/themes/trailcurrent/trailcurrent.plymouth\n\
        # Rebuild initramfs so the new Plymouth theme is actually\n# included. PRIOR\
