        \n", "set -e\necho \"[hook 16] validating /etc/sudoers\"\nchroot \"$1\" visudo\
        \ -c\n", "set -e\necho \"[hook 17] writing /etc/playbill-release\"\n{\n  \
        \  echo \"PLAYBILL_VERSION=\\\"${PLAYBILL_VERSION:-dev}\\\"\"\n    echo \"\
        PLAYBILL_BUILD_DATE=\\\"$(date -R)\\\"\"\n    echo \"PLAYBILL_BUILD_HOST=\\\
        \"$(hostname)\\\"\"\n    echo \"PLAYBILL_TARGET=\\\"radxa-dragon-q6a\\\"\"\
        \n} > \"$1/etc/playbill-release\"\n", "set -e\necho \"[hook 18] fixing ownership\
        \ of /home/trailcurrent\"\nchroot \"$1\" chown -R trailcurrent:trailcurrent\
        \ /home/trailcurrent\n", "set -e\necho \"[hook 19] enabling services\"\nchroot\
        \ \"$1\" systemctl disable ssh.socket 2>/dev/null || true\nchroot \"$1\" systemctl\
        \ mask    ssh.socket 2>/dev/null || true\nrm -f \"$1/etc/systemd/system/ssh.service.requires/ssh.socket\"\
        \n\nchroot \"$1\" systemctl enable \\\n    ssh.service \\\n    avahi-daemon.service\
        \ \\\n    NetworkManager.service \\\n    gdm.service \\\n    trailcurrent-playbill-firstboot.service\n\
        chroot \"$1\" systemctl set-default graphical.target\n", "set -e\necho \"\
        [hook 20] patching kernel cmdline\"\nCMDLINE=\"$1/etc/kernel/cmdline\"\nif\
        \ [ -f \"$CMDLINE\" ] && ! grep -q \"usbcore.autosuspend\" \"$CMDLINE\"; then\n\
        \    sed -i 's/$/ usbcore.autosuspend=-1/' \"$CMDLINE\"\nfi\nEXTLINUX=\"$1/boot/extlinux/extlinux.conf\"\
        \nif [ -f \"$EXTLINUX\" ] && ! grep -q \"usbcore.autosuspend\" \"$EXTLINUX\"\
        ; then\n    sed -i '/^[[:space:]]*append/ s/$/ usbcore.autosuspend=-1/' \"\
        $EXTLINUX\"\nfi\nfor entry in \"$1\"/boot/efi/loader/entries/*.conf; do\n\
        \    [ -f \"$entry\" ] || continue\n    if ! grep -q \"usbcore.autosuspend\"\
        \ \"$entry\"; then\n        sed -i '/^options / s/$/ usbcore.autosuspend=-1/'\
        \ \"$entry\"\n    fi\ndone\n", "set -e\necho \"[hook 21] installing device-tree\
        \ overlay (unused-pins)\"\n\nSTAGING=\"${PLAYBILL_STAGING:-/tmp/playbill-staging}\"\
        \nOVERLAYS=\"qcs6490-radxa-dragon-q6a-playbill-unused-pins-disable.dtbo\"\n\
        for OVR in $OVERLAYS; do\n    if [ ! -f \"$STAGING/files/dtbo/$OVR\" ]; then\n\
        \        echo \"  ERROR: overlay $OVR missing from staging\" >&2\n       \
        \ exit 1\n    fi\ndone\n\nKVER=\"\"\nfor d in \"$1\"/usr/lib/linux-image-*;\
        \ do\n    [ -d \"$d\" ] || continue\n    KVER=\"${d##*/linux-image-}\"\n \
        \   break\ndone\nif [ -z \"$KVER\" ]; then\n    echo \"  ERROR: no /usr/lib/linux-image-*/\
        \ in chroot\" >&2\n    exit 1\nfi\n\nENTRY_TOKEN=$(cat \"$1/etc/kernel/entry-token\"\
        \ 2>/dev/null || echo \"\")\nif [ -z \"$ENTRY_TOKEN\" ]; then\n    echo \"\
        \  ERROR: /etc/kernel/entry-token missing\" >&2\n    exit 1\nfi\n\nEFI_ENTRY=\"\
        $1/boot/efi/$ENTRY_TOKEN/$KVER\"\nmkdir -p \"$EFI_ENTRY/dtbo\"\nfor OVR in\
        \ $OVERLAYS; do\n    install -m 644 \"$STAGING/files/dtbo/$OVR\" \"$EFI_ENTRY/dtbo/$OVR\"\
        \ndone\n\nBASE_DTB=$(find \"$1/usr/lib/linux-image-$KVER/\" -type f -name\
        \ \"*radxa-dragon-q6a.dtb\" 2>/dev/null | head -1)\nif [ -z \"$BASE_DTB\"\
        \ ]; then\n    echo \"  ERROR: base DTB *radxa-dragon-q6a.dtb not found\"\
        \ >&2\n    exit 1\nfi\ninstall -m 644 \"$BASE_DTB\" \"$EFI_ENTRY/\"\nBASE_NAME=$(basename\
        \ \"$BASE_DTB\")\n\nLOADER=\"$1/boot/efi/loader/entries/${ENTRY_TOKEN}-${KVER}.conf\"\
        \nif [ ! -f \"$LOADER\" ]; then\n    LOADER=$(ls \"$1\"/boot/efi/loader/entries/${ENTRY_TOKEN}-${KVER}*.conf\
