        \ -m 644 \"$FILES/modprobe/disable-unused.conf\" \\\n    \"$1/etc/modprobe.d/disable-unused.conf\"\
        \n", "set -e\necho \"[hook 14] masking rsetup + boot-hang services\"\n# Two\
        \ clusters of masks:\n#   (a) Q6A safety — rsetup.service + config.automount,\
        \ otherwise\n#       Radxa's first-boot reads /config/before.txt and calls\n\
        #       disable_service ssh, leaving the board unreachable.\n#   (b) Boot-graph\
        \ deletes — every service below pulls\n#       network-online.target into\
        \ the boot graph and stalls\n#       boot waiting on networking. We are a\
        \ desktop where the\n#       user configures WiFi at first login; boot must\
        \ not\n#       block on a network connection that doesn't exist yet.\nMASK=\"\
        rsetup.service \\\n      config.automount \\\n      NetworkManager-wait-online.service\
        \ \\\n      systemd-networkd-wait-online.service \\\n      systemd-networkd.service\
        \ \\\n      systemd-networkd.socket \\\n      cloud-init.service \\\n    \
