        \nmkdir -p \"$WP_DIR\"\ninstall -m 644 \"$STAGING/branding/wallpaper-light.png\"\
        \ \"$WP_DIR/wallpaper-light.png\"\ninstall -m 644 \"$STAGING/branding/wallpaper-dark.png\"\
        \  \"$WP_DIR/wallpaper-dark.png\"\ninstall -m 644 \"$STAGING/branding/playbill-logo.svg\"\
        \   \"$WP_DIR/playbill-logo.svg\"\n# Rasterized logo for GDM\ninstall -m 644\
