        \ninstall -m 644 \"$FILES/gnome/gdm-dconf/profile-gdm\" \\\n    \"$1/etc/dconf/profile/gdm\"\
        \n\nchroot \"$1\" dconf update 2>&1 || \\\n    echo \"  WARNING: dconf update\
        \ failed (non-fatal under qemu)\"\n", "set -e\necho \"[hook 8] installing\
