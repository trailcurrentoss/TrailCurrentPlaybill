PACKAGE_NAME="trailcurrent-playbill-dkms"
PACKAGE_VERSION="1.0.0"

# Build all modules with the kernel's standard out-of-tree pattern.
# DKMS will invoke `make -C $kernel_source_dir M=$dkms_tree/$pkg-$ver/build modules`.
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

# Auto-rebuild on every kernel upgrade.
AUTOINSTALL="yes"

# Re-enable autoload only after a manual modprobe verification on the
# running kernel has shown no oops. Until then, the modules will be
# installed under /lib/modules/.../updates/dkms/ and reachable via
# `modprobe em28xx` but not auto-loaded by udev on hot-plug.
# (Once verified safe, set REMAKE_INITRD="no" to keep initramfs untouched
# and let depmod + modules.alias do the autoload — these drivers never
# need to be in the initramfs because rootfs mounts long before /dev/dvb.)
REMAKE_INITRD="no"

# Module table — DEST_MODULE_LOCATION must point at the kernel's media
# subtree so depmod finds the right place; MODULES_CONF entries are not
# used here because we let depmod/modules.alias drive autoload.

BUILT_MODULE_NAME[0]="em28xx"
BUILT_MODULE_LOCATION[0]=""
DEST_MODULE_LOCATION[0]="/updates/dkms"

BUILT_MODULE_NAME[1]="em28xx-dvb"
BUILT_MODULE_LOCATION[1]=""
DEST_MODULE_LOCATION[1]="/updates/dkms"

BUILT_MODULE_NAME[2]="lgdt3306a"
BUILT_MODULE_LOCATION[2]=""
DEST_MODULE_LOCATION[2]="/updates/dkms"

BUILT_MODULE_NAME[3]="si2157"
BUILT_MODULE_LOCATION[3]=""
DEST_MODULE_LOCATION[3]="/updates/dkms"

BUILT_MODULE_NAME[4]="tveeprom"
BUILT_MODULE_LOCATION[4]=""
DEST_MODULE_LOCATION[4]="/updates/dkms"
